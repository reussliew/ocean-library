<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#061021">
<meta name="apple-mobile-web-app-title" content="海洋图书馆">
<meta name="application-name" content="海洋图书馆">
<title>海洋图书馆 · Ocean Education Library Group</title>
<link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png">
<link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png">
<link rel="manifest" href="manifest.webmanifest">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Noto+Sans+SC:wght@400;500;700;900&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#061021; --bg2:#0A1A38;
    --panel:rgba(14,32,64,.62); --panel-solid:#0E2143; --panel2:rgba(9,22,48,.66);
    --ink:#05101f;
    --text:#EAF3FC; --sec:#9DB6D8; --muted:#6E86AC;
    --line:rgba(96,158,255,.16); --line2:rgba(96,158,255,.28);
    --teal:#19E3D2; --blue:#2EA0F0; --violet:#8A7BFF; --indigo:#6E5CF5;
    --gold:#F2C44E; --gold2:#E0A23A; --green:#26D6A6; --rose:#FF8FB3;
    --g-cool:linear-gradient(120deg,#19E3D2 0%,#2EA0F0 52%,#7C6CF5 100%);
    --g-gold:linear-gradient(120deg,#FFE08A 0%,#F2C44E 45%,#E0A23A 100%);
    --g-blue:linear-gradient(120deg,#37B6FF 0%,#2E7BF0 100%);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Inter','Noto Sans SC',system-ui,sans-serif;color:var(--text);line-height:1.6;
    -webkit-font-smoothing:antialiased;background:var(--bg);position:relative;min-height:100vh;
    background-image:
      radial-gradient(90% 60% at 18% -8%,rgba(25,227,210,.16),transparent 55%),
      radial-gradient(80% 55% at 92% 4%,rgba(124,108,245,.20),transparent 55%),
      radial-gradient(120% 80% at 50% 120%,rgba(46,123,240,.18),transparent 60%),
      linear-gradient(180deg,#071427 0%,#061021 40%,#050D1C 100%);
  }
  /* drifting bubbles */
  .bubbles{position:fixed;inset:0;overflow:hidden;z-index:0;pointer-events:none}
  .bubbles i{position:absolute;bottom:-40px;border-radius:50%;
    background:radial-gradient(circle at 30% 30%,rgba(255,255,255,.5),rgba(120,200,255,.06));
    border:1px solid rgba(150,210,255,.18);animation:rise linear infinite;opacity:.5}
  @keyframes rise{to{transform:translateY(-110vh) translateX(30px);opacity:0}}
  a{color:inherit;text-decoration:none}
  .hidden{display:none!important}
  .wrap{max-width:1180px;margin:0 auto;padding:0 22px;position:relative;z-index:1}
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:rgba(96,158,255,.3);border-radius:10px}

  .glass{background:var(--panel);border:1px solid var(--line);border-radius:18px;
    backdrop-filter:blur(14px);box-shadow:0 18px 40px -24px rgba(0,0,0,.7),inset 0 1px 0 rgba(255,255,255,.04)}

  /* ---------- logo ---------- */
  .logo{display:flex;align-items:center;gap:12px}
  .logo .mark{width:46px;height:46px;flex:0 0 auto;filter:drop-shadow(0 4px 14px rgba(34,180,235,.45))}
  .logo .wm-zh{display:block;font-family:'Noto Sans SC',sans-serif;font-weight:900;font-size:20px;letter-spacing:2px;line-height:1.1;color:#EAF6FF;text-shadow:0 2px 10px rgba(20,70,140,.55)}
  .logo .wm-en{display:block;font-size:9px;letter-spacing:2.2px;color:var(--sec);font-weight:700;margin-top:2px}
  .logo-mk{width:auto;display:block;filter:drop-shadow(0 4px 14px rgba(34,180,235,.5))}

  /* ---------- nav ---------- */
  nav{position:sticky;top:0;z-index:40;background:rgba(6,15,32,.72);backdrop-filter:blur(16px);
    border-bottom:1px solid var(--line)}
  .navbar{display:flex;align-items:center;gap:18px;height:74px}
  .navlinks{display:flex;flex-wrap:nowrap;gap:4px;margin-left:14px}
  .navlinks button{background:transparent;border:none;color:var(--sec);font:inherit;font-size:14px;font-weight:700;
    padding:9px 16px;border-radius:12px;cursor:pointer;transition:.15s;position:relative;white-space:nowrap;word-break:keep-all}
  .navlinks button:hover{color:var(--text);background:rgba(96,158,255,.08)}
  .navlinks button.active{color:var(--text)}
  .navlinks button.active::after{content:"";position:absolute;left:16px;right:16px;bottom:1px;height:3px;border-radius:3px;background:var(--g-gold)}
  .nav-right{margin-left:auto;display:flex;align-items:center;gap:14px}
  .navsearch{display:flex;align-items:center;gap:8px;background:rgba(8,20,44,.8);border:1px solid var(--line);
    border-radius:12px;padding:9px 14px;color:var(--muted);font-size:13px;min-width:210px}
  .navsearch input{background:transparent;border:none;outline:none;color:var(--text);font:inherit;font-size:13px;width:100%}
  .profile{display:flex;align-items:center;gap:8px;background:rgba(8,20,44,.8);border:1px solid var(--line);
    border-radius:14px;padding:5px 10px 5px 5px;cursor:pointer;height:56px;min-width:176px;max-width:190px;overflow:hidden}
  .profile.profile-loading{visibility:hidden}
  .profile .pa{width:38px;height:38px;border-radius:11px;overflow:hidden;flex:0 0 auto;background:var(--g-cool);display:flex;align-items:center;justify-content:center}
  .profile .profile-info{min-width:0;flex:1;display:flex;flex-direction:column;justify-content:center;gap:2px}
  .profile .pn{display:block;font-size:13px;font-weight:800;line-height:1.1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .profile .pl{display:block;font-size:10px;color:var(--gold);font-weight:800;letter-spacing:0;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .profile .car{color:var(--muted);font-size:11px;flex:0 0 auto}

  main{padding:26px 0 40px}
  .grid{display:grid;gap:18px}

  /* ---------- hero ---------- */
  .hero{position:relative;overflow:hidden;border-radius:26px;padding:38px 40px;min-height:330px;
    border:1px solid var(--line2);
    background:
      linear-gradient(90deg,rgba(4,10,24,.80) 0%,rgba(4,10,24,.46) 30%,rgba(4,10,24,.12) 55%,rgba(4,10,24,.03) 74%,transparent 100%),
      url('https://uszuzntnsrcruvoepwzw.supabase.co/storage/v1/object/public/assets/hero-bg.png') center/cover no-repeat,
      #0A1430;
    box-shadow:0 30px 70px -40px rgba(0,0,0,.8)}
  .hero .shelf{position:absolute;inset:0;pointer-events:none;opacity:.55;mix-blend-mode:screen;
    background:linear-gradient(108deg,
      transparent 0 14%,rgba(150,220,255,.10) 15% 17%,transparent 18% 27%,
      rgba(170,228,255,.13) 28% 31%,transparent 32% 45%,rgba(190,235,255,.10) 46% 49%,
      transparent 50% 63%,rgba(150,220,255,.08) 64% 66%,transparent 67%);
    -webkit-mask:linear-gradient(#000,transparent 85%);mask:linear-gradient(#000,transparent 85%)}
  .hero-grid{position:relative;display:grid;grid-template-columns:1.15fr .85fr;gap:20px;align-items:center;z-index:2}
  .kicker{display:inline-flex;align-items:center;gap:10px;font-size:11px;font-weight:800;letter-spacing:2px;color:var(--teal);margin-bottom:8px}
  .kicker::before,.kicker::after{content:"◈";color:var(--gold);font-size:9px}
  .hero h1{font-family:'Noto Sans SC',sans-serif;font-weight:900;font-size:70px;line-height:1.02;letter-spacing:5px;
    color:#F6FBFF;
    text-shadow:0 2px 4px rgba(2,8,20,.95),0 5px 18px rgba(3,10,24,.9),0 0 22px rgba(95,185,255,.75),0 0 46px rgba(46,123,240,.5);
    margin:2px 0 12px}
  .hero .tline{font-size:20px;font-weight:800;color:#DDEBFF;letter-spacing:1px}
  .hero .srg{margin-top:8px;font-size:13px;font-weight:800;letter-spacing:5px;color:var(--gold)}
  .hero-cta{display:flex;gap:14px;margin-top:24px;flex-wrap:wrap}
  .btn{border:none;font:inherit;font-weight:800;font-size:14px;border-radius:14px;padding:13px 24px;cursor:pointer;
    display:inline-flex;align-items:center;gap:9px;transition:.15s;letter-spacing:.5px}
  .btn:hover{transform:translateY(-2px);filter:brightness(1.06)}
  .btn-gold{background:var(--g-gold);color:#3A2A06;box-shadow:0 12px 26px -12px rgba(242,196,78,.8)}
  .btn-blue{background:var(--g-blue);color:#04203f;box-shadow:0 12px 26px -12px rgba(46,123,240,.8)}
  .hero-right{position:relative;display:flex;align-items:center;justify-content:center}
  .hero-right::before{content:"";position:absolute;width:330px;height:330px;border-radius:50%;
    background:radial-gradient(circle,rgba(46,160,255,.38),rgba(124,108,245,.18) 45%,transparent 68%);filter:blur(6px);z-index:0}
  .mascot{position:relative;z-index:1}
  .speech{z-index:2}
  .trident{position:absolute;top:-6px;right:24px;font-size:26px;color:var(--gold);filter:drop-shadow(0 0 12px rgba(242,196,78,.6))}
  .mascot{width:300px;max-width:100%;display:block;filter:drop-shadow(0 24px 34px rgba(0,0,0,.55))}
  .speech{position:absolute;left:-6px;top:18px;max-width:200px;background:rgba(10,24,52,.92);border:1px solid var(--line2);
    border-radius:16px;padding:12px 14px;font-size:13px;line-height:1.5;box-shadow:0 12px 30px -16px #000}
  .speech b{color:var(--teal)}
  .speech::after{content:"";position:absolute;right:-9px;top:26px;border:8px solid transparent;border-left-color:rgba(10,24,52,.92)}

  /* ---------- section headers ---------- */
  .sec-h{display:flex;align-items:center;gap:9px;font-size:16px;font-weight:800;margin-bottom:2px}
  .sec-h .all{margin-left:auto;font-size:12px;font-weight:700;color:var(--sec);cursor:pointer}
  .sec-h .all:hover{color:var(--teal)}

  /* ---------- stat cards ---------- */
  .stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:18px}
  .stat{padding:20px;border-radius:18px;position:relative;overflow:hidden;transition:transform .18s,box-shadow .18s}
  .bcard,.mcard{transition:transform .18s,box-shadow .18s}
  .stat:hover,.bcard:hover,.mcard:hover{transform:translateY(-3px);box-shadow:0 22px 46px -26px rgba(0,0,0,.85),0 0 0 1px var(--line2)}
  .stat .lbl{font-size:13px;color:var(--sec);font-weight:600}
  .stat .num{font-size:34px;font-weight:900;margin:6px 0 4px;letter-spacing:.5px}
  .stat .delta{font-size:11px;font-weight:700;color:var(--green)}
  .stat .em{position:absolute;right:10px;bottom:6px;width:62px;height:62px;opacity:.9}
  .ring{position:absolute;right:14px;top:50%;transform:translateY(-50%);width:64px;height:64px}

  /* ---------- poll ---------- */
  .poll .q{font-size:14px;font-weight:700;margin:4px 0 14px;color:#DCEAFF}
  .opt{display:block;width:100%;text-align:left;background:rgba(8,20,44,.55);color:var(--text);
    border:1px solid var(--line);border-radius:13px;padding:12px 15px;margin-bottom:11px;font:inherit;font-size:14px;
    cursor:pointer;transition:.15s;position:relative;overflow:hidden}
  .opt:hover{border-color:var(--line2)}
  .opt .bar{position:absolute;inset:0;width:0;z-index:0;transition:width .7s cubic-bezier(.2,.7,.2,1);opacity:.9}
  .opt .lbl{position:relative;z-index:1;display:flex;align-items:center;gap:10px}
  .opt .ic{width:26px;height:26px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;flex:0 0 auto}
  .opt .pc{margin-left:auto;font-weight:800;color:#EAF3FC}
  .opt .vt{font-size:11px;color:var(--muted);margin-left:8px}
  .poll-foot{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-top:6px}
  .poll-foot b{color:var(--text)}

  /* ---------- reading progress ---------- */
  .prow{display:flex;align-items:center;gap:13px;padding:12px 0;border-bottom:1px solid var(--line)}
  .prow:last-child{border-bottom:none}
  .prow .info{min-width:128px}
  .prow .nm{font-weight:800;font-size:14px;display:flex;align-items:center;gap:7px}
  .prow .lv{font-size:10px;color:var(--sec);font-weight:700}
  .role{font-size:9px;font-weight:800;padding:2px 7px;border-radius:7px;background:var(--gold-soft,rgba(242,196,78,.16));color:var(--gold);border:1px solid rgba(242,196,78,.4)}
  .prow .cnt{font-size:12px;color:var(--sec);min-width:74px}
  .pbar{flex:1;height:8px;background:rgba(8,20,44,.7);border-radius:8px;overflow:hidden;max-width:230px}
  .pbar i{display:block;height:100%;border-radius:8px;background:var(--g-cool)}
  .prow .pct{font-weight:800;font-size:13px;width:44px;text-align:right}
  .prow .mdl{font-size:20px;width:24px;text-align:center}

  /* ---------- avatars ---------- */
  .av{flex:0 0 auto;display:flex;align-items:center;justify-content:center;overflow:visible;background:none;box-shadow:none}
  .av svg{width:84%;height:84%}
  .av img{width:100%;height:100%;object-fit:contain;display:block;filter:drop-shadow(0 4px 8px rgba(0,0,0,.45))}
  .podium-whale{width:128px;max-width:100%;height:auto;display:block;margin:0 auto 4px;filter:drop-shadow(0 10px 16px rgba(0,0,0,.55))}
  .pod.p1 .podium-whale{width:150px}
  .logo-img{width:auto;display:block;filter:drop-shadow(0 4px 16px rgba(34,180,235,.45))}
  .profile .pa img{width:100%;height:100%;object-fit:cover;display:block}

  /* ---------- diamond feed ---------- */
  .dia{display:flex;gap:12px;padding:13px 0;border-bottom:1px solid var(--line)}
  .dia:last-child{border-bottom:none}
  .dia .dt{font-weight:800;font-size:14px;color:#E7F1FF;display:flex;align-items:center;gap:7px}
  .dia .dt .dm{color:var(--teal)}
  .dia .meta{font-size:11px;color:var(--muted);margin:2px 0 6px}
  .dia .qt{font-size:13px;color:var(--sec);font-style:italic;border-left:2px solid var(--gold);padding-left:10px}
  .diamond-archive{display:grid;gap:12px;margin-top:18px}
  .diamond-entry{padding:0 16px;border-radius:14px}
  .diamond-entry summary{cursor:pointer;list-style:none;padding:15px 0;font-weight:800;color:#E7F1FF}
  .diamond-entry summary::-webkit-details-marker{display:none}
  .diamond-entry summary .meta{display:block;margin-top:4px;font-size:11px;font-weight:600;color:var(--muted)}
  .diamond-entry .full-qt{white-space:pre-wrap;line-height:1.65;color:var(--sec);font-size:13px;border-top:1px solid var(--line);padding:14px 0 16px}
  .book-modal{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;padding:24px;background:rgba(1,8,25,.78);backdrop-filter:blur(8px)}
  .book-modal[hidden]{display:none}
  .book-dialog{width:min(720px,100%);max-height:86vh;overflow:auto;padding:24px;border-radius:20px;position:relative}
  .book-close{position:absolute;right:16px;top:14px;width:34px;height:34px;border-radius:50%;border:1px solid var(--line2);background:rgba(5,29,69,.9);color:var(--text);font-size:20px;cursor:pointer}
  .book-dialog .book-author{color:var(--sec);font-size:13px;margin:5px 0 20px}
  .reader-entry{border-top:1px solid var(--line)}
  .reader-entry summary{display:flex;align-items:center;gap:11px;cursor:pointer;list-style:none;padding:13px 2px;font-weight:800}
  .reader-entry summary::-webkit-details-marker{display:none}
  .reader-entry summary small{margin-left:auto;color:var(--muted);font-weight:600}
  .reader-entry .reader-diamond{white-space:pre-wrap;line-height:1.65;color:var(--sec);font-size:13px;border-left:2px solid var(--gold);padding:4px 0 14px 13px;margin:0 0 12px 47px}
  .no-readers{padding:18px 0;color:var(--muted)}
  .app-overlay{position:fixed;inset:0;z-index:150;display:flex;align-items:center;justify-content:center;padding:22px;background:rgba(1,8,25,.86);backdrop-filter:blur(10px)}
  .app-overlay[hidden]{display:none}
  .app-panel{width:min(480px,100%);padding:26px;border-radius:22px;position:relative}
  .app-panel h2{font-size:23px;margin-bottom:5px}.app-panel .sub-h{margin-bottom:16px}
  .admin-grid{display:grid;gap:16px}.admin-list{display:grid;gap:8px;max-height:520px;overflow:auto}
  .admin-row{display:grid;grid-template-columns:minmax(100px,1fr) 90px 110px auto;gap:8px;align-items:center;padding:10px;border-bottom:1px solid var(--line)}
  .admin-row input{min-width:0;background:rgba(4,25,64,.85);border:1px solid var(--line);border-radius:8px;padding:8px;color:var(--text)}
  .mini-btn{border:1px solid var(--line2);background:rgba(46,123,240,.16);color:var(--text);border-radius:8px;padding:7px 10px;cursor:pointer;font-weight:700}
  .mini-btn.danger{color:#ff9caf;border-color:rgba(255,84,112,.35);background:rgba(255,84,112,.09)}
  .teacher-chip{display:flex;align-items:center;gap:10px;padding:12px;border:1px solid var(--line2);border-radius:12px;margin-bottom:15px}
  .form-status{font-size:12px;color:var(--teal);margin-top:10px;text-align:center;min-height:20px}

  /* ---------- book lists ---------- */
  .bl-feat{border-radius:16px;padding:18px;position:relative;overflow:hidden;margin-bottom:13px;
    background:radial-gradient(80% 120% at 85% 20%,rgba(124,108,245,.3),transparent 60%),linear-gradient(120deg,#10285a,#0c1c40)}
  .bl-feat .t{font-size:17px;font-weight:900;letter-spacing:.5px}
  .bl-feat .d{font-size:12px;color:var(--sec);margin:4px 0 10px}
  .bl-feat .c{font-size:11px;font-weight:800;color:var(--gold)}
  .bl-feat .em{position:absolute;right:8px;bottom:0;width:80px;height:80px}
  .bl-row{display:flex;align-items:center;gap:13px;padding:11px 0;border-bottom:1px solid var(--line)}
  .bl-row:last-child{border-bottom:none}
  .bl-thumb{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex:0 0 auto}
  .bl-row .t{font-weight:700;font-size:14px}
  .bl-row .c{font-size:11px;color:var(--muted)}

  /* ---------- popular books ---------- */
  .hot{display:flex;align-items:center;gap:13px;padding:12px 0;border-bottom:1px solid var(--line)}
  .hot:last-child{border-bottom:none}
  .hot .rk{width:26px;height:26px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:13px;flex:0 0 auto;color:#06101f}
  .hot .cv{width:40px;height:54px;border-radius:7px;flex:0 0 auto;box-shadow:0 6px 14px -6px #000;display:flex;align-items:flex-end;justify-content:center;font-size:18px;padding-bottom:3px}
  .hot .t{font-weight:700;font-size:14px;line-height:1.25}
  .hot .a{font-size:11px;color:var(--muted)}

  /* ---------- latest updates ---------- */
  .update-list{display:grid;gap:12px}
  .update-card{display:flex;gap:13px;align-items:flex-start;padding:13px 14px;border-radius:15px;background:rgba(8,20,44,.5);border:1px solid var(--line)}
  .update-icon{width:38px;height:38px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex:0 0 auto;background:rgba(34,231,240,.14);border:1px solid rgba(34,231,240,.25);font-size:18px}
  .update-title{font-weight:900;font-size:14px;line-height:1.3}
  .update-desc{font-size:12px;color:var(--sec);line-height:1.45;margin-top:4px}
  .update-date{font-size:11px;color:var(--gold);font-weight:900;margin-left:auto;white-space:nowrap;padding-top:2px}
  .nm-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}
  .nm-card{text-align:center;padding:14px 8px;border-radius:16px;background:rgba(8,20,44,.5);border:1px solid var(--line)}
  .nm-card .nm{font-weight:800;font-size:13px;margin-top:8px}
  .nm-card .lv{font-size:10px;color:var(--sec);font-weight:700}
  .nm-card .wl{margin-top:9px;font-size:11px;font-weight:800;color:var(--teal);border:1px solid var(--line2);border-radius:9px;padding:5px 0;cursor:pointer}
  .nm-card .wl:hover{background:rgba(25,227,210,.12)}

  /* ---------- podium / leaderboard ---------- */
  .podium{display:grid;grid-template-columns:1fr 1.15fr 1fr;align-items:end;gap:12px;margin-bottom:6px}
  .pod{border-radius:16px;padding:16px 10px;text-align:center;background:rgba(8,20,44,.55);border:1px solid var(--line)}
  .pod.p1{padding-top:24px;border-color:rgba(242,196,78,.55);background:linear-gradient(180deg,rgba(242,196,78,.14),rgba(8,20,44,.5));
    box-shadow:0 0 0 1px rgba(242,196,78,.35),0 16px 40px -22px rgba(242,196,78,.5)}
  .pod .crown{font-size:22px;margin-bottom:2px}
  .pod .pn{font-weight:800;font-size:13px;margin:8px 0 2px}
  .pod .pp{font-weight:900;font-size:17px;background:var(--g-gold);-webkit-background-clip:text;background-clip:text;color:transparent}
  .pod .pp small{font-size:10px;color:var(--muted);-webkit-text-fill-color:var(--muted)}
  .lrow{display:flex;align-items:center;gap:12px;padding:10px 6px;border-radius:12px}
  .lrow+.lrow{margin-top:2px}

       <div class="diamond-stack">
         ${Array.from({length:10},(_,i)=>`<textarea class="diamond-input" data-diamond-no="${i+1}" placeholder="Diamond ${i+1}：分享关键感悟、金句或突破……"></textarea>`).join('')}

   <h2 class="view-h" style="margin-top:30px;font-size:22px">成员 Diamond 记录</h2>
   <div class="sub-h">${DIAMONDS.length} 条来自群聊的原文记录，点击展开阅读全文。</div>

    $('#new-book-inline').classList.toggle('hidden');

/* =================== BOOKS =================== */
const BOOK_TITLE_ALIASES={
  '为什么你道歉':'为什么你不道歉',
  '躺平，是浪费你的人生':'躺平，是在浪费你的人生'
};
const canonicalBookTitle=title=>BOOK_TITLE_ALIASES[title]||title;
function closeBook(){
  $('#book-modal').hidden=true;
  document.body.style.overflow='';
}
function shareBookDiamond(index){
  const book=BOOKS[index];
  if(!book)return;
  closeBook();
  switchView('diamond');
  const bookSelect=$('#f-book');
  if(bookSelect)bookSelect.value=book[0];
  const text=$('#f-text');
  if(text)text.focus();
}
function showBook(index){
  const book=BOOKS[index];
  if(!book)return;
  const videoUrl=bookVideoUrl(book[0])||book[5]||'';
  const matches=DIAMONDS.filter(d=>canonicalBookTitle(d.title)===book[0]);
  const readers=new Map();
  matches.forEach(d=>{
    if(!readers.has(d.who))readers.set(d.who,[]);
    readers.get(d.who).push(d);
  });
  const readerHTML=[...readers].map(([name,entries])=>{
    const member=MEMBERS.find(m=>m.name===name)||entries[0];
    return `<details class="reader-entry">
      <summary>${avatar(member,36)}<span>${esc(name)}</span><small>${entries.length} 条 Diamond · 点击查看</small></summary>
      ${entries.map(d=>`<div class="reader-diamond"><strong>${esc(d.time)}</strong>\n\n${esc(d.qt)}</div>`).join('')}
    </details>`;
  }).join('');
  $('#book-modal-content').innerHTML=`
    <h2 class="view-h" id="book-modal-title" style="font-size:24px;padding-right:42px">${esc(book[0])}</h2>
    <div class="book-author">${esc(book[1])}</div>
    ${book[3]?`<a class="btn btn-gold" style="width:100%;justify-content:center;margin:16px 0 8px" href="${esc(book[3])}" target="_blank" rel="noopener noreferrer">📖 阅读书本</a>`:''}
    ${videoUrl?`<a class="btn btn-gold" style="width:100%;justify-content:center;margin:16px 0 8px" href="${esc(videoUrl)}" target="_blank" rel="noopener noreferrer">🎥 观看视频</a>`:''}
    <button class="btn btn-blue" style="width:100%;justify-content:center;margin:16px 0" onclick="shareBookDiamond(${index})">💎 分享这本书的 Diamond</button>
    <div class="sec-h">正在阅读 / 已分享 Diamond 的成员</div>
    ${readerHTML||'<div class="no-readers">暂无阅读记录</div>'}`;
  $('#book-modal').hidden=false;
  document.body.style.overflow='hidden';
}
function renderBooks(){
  $('#view-books').innerHTML=`
   <h2 class="view-h">📖 书库</h2>
   <div class="sub-h">${BOOKS.length} 本来自海洋图书馆群聊与附件的书籍。</div>
   <div class="cat-grid" style="margin-bottom:18px">${CATS.map(c=>`<img src="${asset(c)}" alt="">`).join('')}</div>
   <input class="search" id="book-search" placeholder="按书名或作者搜索……">

function makeBubbles(){const b=$('#bubbles');let h='';for(let i=0;i<16;i++){const s=4+Math.random()*22,l=Math.random()*100,d=8+Math.random()*16,dl=-Math.random()*16;
  h+=`<i style="left:${l}%;width:${s}px;height:${s}px;animation-duration:${d}s;animation-delay:${dl}s"></i>`;}b.innerHTML=h;}

/* ===== Load live data from Supabase (falls back to built-in data) ===== */
async function loadFromSupabase(){
  if(!sb) return;
  try{
    const [m,b,dia,activity,votes]=await Promise.all([
      sb.from('members').select('*').order('points',{ascending:false}),
      sb.from('books').select('*'),
      sb.from('diamonds').select('*').order('created_at',{ascending:false}),
      sb.from('teacher_activity').select('member_name,last_seen').order('last_seen',{ascending:false}),
      sb.from('daily_votes').select('member_name,option_index').eq('vote_date',malaysiaDateKey())
    ]);
    if(m&&m.data&&m.data.length){
      MEMBERS=m.data.map(r=>({name:r.name,lv:r.level||0,pts:r.points||0,weekly:r.weekly||0,
        books:r.books_count||0,diamonds:r.diamonds||0,role:r.role||'',isNew:!!r.is_new,img:r.avatar||'m1.png'}));
    }
    if(b&&b.data&&b.data.length){
      BOOKS=b.data.map(r=>{
        const pdfUrl=bookPdfUrl(r.title)||r.pdf_url||'';
        const videoUrl=bookVideoUrl(r.title)||r.video_url||'';
        return [r.title,r.author||'',r.icon||'📘',pdfUrl,r.pdf_path||'',videoUrl];
      });
    }
    if(dia&&dia.data&&dia.data.length){
      DIAMONDS=dia.data.map(r=>({who:r.author_name,title:canonicalBookTitle(r.title),qt:r.body||'',time:fmtTime(r.created_at),createdAt:r.created_at,img:r.avatar||'m1.png'}));
    }
    if(activity&&activity.data)ACTIVE_MEMBERS=activity.data;
    POLL=dailyPoll();
    if(votes&&votes.data){
      votes.data.forEach(v=>{if(v.option_index>=0&&v.option_index<POLL.counts.length)POLL.counts[v.option_index]++;});
      const teacher=localStorage.getItem('ocean_teacher_name');
      const own=votes.data.find(v=>v.member_name===teacher);
      if(own)POLL.voted=own.option_index;
    }
  }catch(e){console.warn('Supabase load failed — using built-in data.',e);}
}

document.addEventListener('keydown',e=>{if(e.key==='Escape'&&!$('#book-modal').hidden)closeBook();});
async function boot(){
  makeBubbles();
  renderChrome();
  if(!sb)renderAll();
}
boot();
